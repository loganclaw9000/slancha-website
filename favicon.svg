<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f0f0d"/>
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7d9b76"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
  </defs>
  <!-- Three sigmoids: x = 1 - 2σ(y-0.28) + 2σ(y-0.50) - 2σ(y-0.72) -->
  <!-- Approximated as dot pattern along the S curve -->
  <g fill="url(#fg)">
    <!-- Top terminal (right) -->
    <circle cx="21" cy="4" r="1.2" opacity="0.7"/>
    <circle cx="22" cy="5.5" r="1.3" opacity="0.8"/>
    <circle cx="23" cy="7" r="1.4" opacity="0.9"/>
    <!-- Top bowl curving left -->
    <circle cx="22" cy="8.5" r="1.4"/>
    <circle cx="20" cy="10" r="1.3"/>
    <circle cx="17" cy="11" r="1.2"/>
    <circle cx="14" cy="11.5" r="1.1"/>
    <!-- Center crossing -->
    <circle cx="12" cy="12.5" r="1.0"/>
    <circle cx="11" cy="14" r="1.1"/>
    <circle cx="12" cy="15.5" r="1.0"/>
    <!-- Bottom bowl curving right -->
    <circle cx="14" cy="17" r="1.1"/>
    <circle cx="17" cy="18.5" r="1.2"/>
    <circle cx="20" cy="20" r="1.3"/>
    <circle cx="22" cy="21.5" r="1.4"/>
    <!-- Bottom crossing back left -->
    <circle cx="20" cy="23" r="1.3"/>
    <circle cx="17" cy="24" r="1.2"/>
    <circle cx="14" cy="24.5" r="1.1"/>
    <!-- Bottom terminal (left) -->
    <circle cx="11" cy="25" r="1.2" opacity="0.9"/>
    <circle cx="10" cy="26.5" r="1.3" opacity="0.8"/>
    <circle cx="9" cy="28" r="1.2" opacity="0.7"/>
  </g>
</svg>
