name: Build & Mirror to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: cd site && npm ci
      - run: cd site && GITHUB_PAGES=true npm run build
        env:
          VITE_SUPABASE_URL: https://tqbvmmhgiivyjjcctqcb.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxYnZtbWhnaWl2eWpqY2N0cWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MTkyNTAsImV4cCI6MjA5MDM5NTI1MH0.zY9_zVBJRwQRhARZSH_tvmSNcbBulbTJ1GZzOMT8hGM
      - run: cp site/dist/index.html site/dist/404.html

      - name: Mirror to loganclaw9000/slancha-website
        run: |
          git config --unset-all http.https://github.com/.extraheader || true
          git remote add mirror https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/loganclaw9000/slancha-website.git
          git push mirror master --force
