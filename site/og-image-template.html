<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Slancha OG Image</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
    }
    
    .card {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #121212 0%, #1a1a1a 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    
    /* Subtle background pattern */
    .card::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(10, 132, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 209, 178, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    
    .logo {
      font-size: 72px;
      font-weight: 700;
      color: #E5E7EB;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }
    
    .logo span {
      color: #0A84FF;
    }
    
    .tagline {
      font-size: 28px;
      font-weight: 500;
      color: #A0AEC0;
      text-align: center;
      max-width: 700px;
      line-height: 1.4;
      position: relative;
      z-index: 1;
    }
    
    .footer {
      position: absolute;
      bottom: 40px;
      font-size: 14px;
      color: #5E6C84;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      z-index: 1;
    }
    
    /* Abstract network lines */
    .network-lines {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.1;
    }
    
    .network-lines svg {
      width: 100%;
      height: 100%;
    }
    
    .line {
      stroke: #0A84FF;
      stroke-width: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Slancha</div>
    <div class="tagline">AI Inference That Improves Itself</div>
    <div class="footer">end-to-end · black box · zero ML overhead</div>
    
    <div class="network-lines">
      <svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
        <!-- Subtle connection lines -->
        <line x1="200" y1="150" x2="400" y2="250" class="line" />
        <line x1="800" y1="150" x2="1000" y2="250" class="line" />
        <line x1="200" y1="380" x2="400" y2="480" class="line" />
        <line x1="800" y1="380" x2="1000" y2="480" class="line" />
        <circle cx="400" cy="250" r="3" fill="#0A84FF" opacity="0.5" />
        <circle cx="1000" cy="250" r="3" fill="#0A84FF" opacity="0.5" />
        <circle cx="400" cy="480" r="3" fill="#0A84FF" opacity="0.5" />
        <circle cx="1000" cy="480" r="3" fill="#0A84FF" opacity="0.5" />
      </svg>
    </div>
  </div>
</body>
</html>
