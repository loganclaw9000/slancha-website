name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PLAYWRIGHT_BROWSERS_PATH: '0'

jobs:
  # Unit and Component Tests
  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Install Vitest
        working-directory: ./site
        run: npm install --save-dev vitest @vitest/coverage-v8

      - name: Run unit tests
        working-directory: ./site
        run: npm run test:unit
        env:
          CI: true

      - name: Run component tests
        working-directory: ./site
        run: npm run test:components
        env:
          CI: true

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./site/coverage/lcov.info
          flags: unit-tests
          name: unit-coverage

  # E2E Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./site
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: ./site
        run: npm run build

      - name: Run E2E tests
        working-directory: ./site
        run: npm run test:e2e
        env:
          CI: true
          VITE_BASE_URL: http://localhost:4173

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 30

      - name: Upload trace files
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-traces
          path: site/.playwright/.trace
          retention-days: 7

  # Accessibility Tests
  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./site
        run: npx playwright install --with-deps chromium

      - name: Install axe-core
        working-directory: ./site
        run: npm install --save-dev @axe-core/playwright

      - name: Build application
        working-directory: ./site
        run: npm run build

      - name: Run accessibility tests
        working-directory: ./site
        run: npm run test:a11y
        env:
          CI: true
          VITE_BASE_URL: http://localhost:4173

      - name: Upload accessibility report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: a11y-report
          path: site/accessibility-report/
          retention-days: 30

  # Visual Regression Tests
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./site
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: ./site
        run: npm run build

      - name: Run visual regression tests
        working-directory: ./site
        run: npm run test:visual
        env:
          CI: true
          VITE_BASE_URL: http://localhost:4173
          PLAYWRIGHT_BASELINE: true

      - name: Upload visual diff images
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: visual-diffs
          path: site/__playwright__/diff/
          retention-days: 30

  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./site
        run: npx playwright install --with-deps chromium

      - name: Build application
        working-directory: ./site
        run: npm run build

      - name: Run performance tests
        working-directory: ./site
        run: npm run test:perf
        env:
          CI: true
          VITE_BASE_URL: http://localhost:4173

      - name: Upload performance report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-report
          path: site/performance-report/
          retention-days: 30

  # Database Integration Tests
  database-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: ./site
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./site
        run: npx playwright install --with-deps chromium

      - name: Run database tests
        working-directory: ./site
        run: npm run test:db
        env:
          CI: true
          VITE_BASE_URL: http://localhost:4173
          VITE_SUPABASE_TEST_URL: ${{ secrets.VITE_SUPABASE_TEST_URL }}
          VITE_SUPABASE_TEST_ANON_KEY: ${{ secrets.VITE_SUPABASE_TEST_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Cleanup test data
        working-directory: ./site
        run: node scripts/cleanup-test-data.js
        if: always()
        env:
          VITE_SUPABASE_TEST_URL: ${{ secrets.VITE_SUPABASE_TEST_URL }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

  # Summary Job
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, accessibility-tests, visual-regression, performance-tests]
    if: always()
    
    steps:
      - name: Generate test summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "✅ Unit Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Unit Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.e2e-tests.result }}" == "success" ]; then
            echo "✅ E2E Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.accessibility-tests.result }}" == "success" ]; then
            echo "✅ Accessibility Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Accessibility Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.visual-regression.result }}" == "success" ]; then
            echo "✅ Visual Regression Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Visual Regression Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.performance-tests.result }}" == "success" ]; then
            echo "✅ Performance Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Performance Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
